// [START declaration]
syntax = "proto3";
// [END declaration]

// [START messages]
message Damage {
  enum DamageType {
    NONE = 0;
    PHYSICAL = 1;   // 1 << 0
    MAGIC = 2;      // 1 << 1
    FIRE = 4;       // 1 << 2
    POISON = 8;     // 1 << 3
  }

  int32 damage_type = 1;
  float amount = 2;
  repeated string status_effect = 3; // optional application of status effects

  string damage_source_uuid = 4;  // where this damage is coming from
}
// [END messages]
